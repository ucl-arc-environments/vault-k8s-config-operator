{{- if .Values.webhook.enable }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    {{- if .Values.certManager.enable }}
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "vault-k8s-config-operator.resourceName" (dict "suffix" "serving-cert" "context" $) }}
    {{- end }}
  name: {{ include "vault-k8s-config-operator.resourceName" (dict "suffix" "validating-webhook-configuration" "context" $) }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "vault-k8s-config-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}
      namespace: {{ .Release.Namespace }}
      path: /validate-environments-arc-ucl-v1-vaultk8sconfig
  failurePolicy: Fail
  name: vvaultk8sconfig-v1.kb.io
  rules:
  - apiGroups:
    - environments.arc.ucl
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - vaultk8sconfigs
  sideEffects: None
{{- end }}
