{{- if .Values.rbacHelpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "vault-k8s-config-operator.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "vault-k8s-config-operator.resourceName" (dict "suffix" "vaultk8sconfig-admin-role" "context" $) }}
rules:
- apiGroups:
  - environments.arc.ucl
  resources:
  - vaultk8sconfigs
  verbs:
  - '*'
- apiGroups:
  - environments.arc.ucl
  resources:
  - vaultk8sconfigs/status
  verbs:
  - get
{{- end }}
