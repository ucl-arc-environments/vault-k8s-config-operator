{{- if .Values.rbac.helpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "vault-k8s-config-operator.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "vault-k8s-config-operator.resourceName" (dict "suffix" "vaultk8sconfig-viewer-role" "context" $) }}
rules:
- apiGroups:
  - environments.arc.ucl
  resources:
  - vaultk8sconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - environments.arc.ucl
  resources:
  - vaultk8sconfigs/status
  verbs:
  - get
{{- end }}
