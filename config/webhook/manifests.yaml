---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-environments-arc-ucl-v1-vaultk8sconfig
  failurePolicy: Ignore
  name: vvaultk8sconfig-v1.kb.io
  rules:
  - apiGroups:
    - environments.arc.ucl
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - vaultk8sconfigs
  sideEffects: None
