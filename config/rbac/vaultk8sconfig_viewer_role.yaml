# This rule is not used by the project vault-k8s-config-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to environments.arc.ucl resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vault-k8s-config-operator
    app.kubernetes.io/managed-by: kustomize
  name: vaultk8sconfig-viewer-role
rules:
- apiGroups:
  - environments.arc.ucl
  resources:
  - vaultk8sconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - environments.arc.ucl
  resources:
  - vaultk8sconfigs/status
  verbs:
  - get
