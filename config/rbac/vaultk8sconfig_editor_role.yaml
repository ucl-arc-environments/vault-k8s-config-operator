# This rule is not used by the project vault-k8s-config-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the environments.arc.ucl.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vault-k8s-config-operator
    app.kubernetes.io/managed-by: kustomize
  name: vaultk8sconfig-editor-role
rules:
- apiGroups:
  - environments.arc.ucl
  resources:
  - vaultk8sconfigs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - environments.arc.ucl
  resources:
  - vaultk8sconfigs/status
  verbs:
  - get
