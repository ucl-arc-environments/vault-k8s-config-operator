# This rule is not used by the project vault-k8s-config-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over environments.arc.ucl.ucl.arc.environments.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vault-k8s-config-operator
    app.kubernetes.io/managed-by: kustomize
  name: vaultk8sconfig-admin-role
rules:
- apiGroups:
  - environments.arc.ucl.ucl.arc.environments
  resources:
  - vaultk8sconfigs
  verbs:
  - '*'
- apiGroups:
  - environments.arc.ucl.ucl.arc.environments
  resources:
  - vaultk8sconfigs/status
  verbs:
  - get
