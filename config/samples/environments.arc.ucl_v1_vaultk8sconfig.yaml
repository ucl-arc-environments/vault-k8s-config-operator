apiVersion: environments.arc.ucl/v1
kind: VaultK8sConfig
metadata:
  labels:
    app.kubernetes.io/name: vault-k8s-config-operator
    app.kubernetes.io/managed-by: kustomize
  name: vaultk8sconfig-sample
spec:
  vaultAddress: https://vault.example.com
  # vaultNamespace: my-namespace  # Optional: for Vault Enterprise
  auth:
    # Token-based authentication
    tokenSecretRef:
      name: vault-auth
      key: token
  engine:
    mountPath: kubernetes
    kubernetesHost: https://kubernetes.default.svc
    # Optional: reference to a Secret with cluster credentials (JWT and CA cert)
    # When omitted, the operator auto-provisions vault-auth resources
    clusterCredentialsSecretRef:
      name: kube-cluster-credentials
      namespace: vault-k8s-config-operator-system
      jwtKey: token
      caCertKey: ca.crt
